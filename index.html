<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="毎朝の運勢">
  <meta name="format-detection" content="telephone=no">
  <title>毎朝の運勢 v0.8.0</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">MORNING FORTUNE</p>
        <h1>毎朝の運勢</h1>
      </div>
      <span class="version-badge">v0.8.0</span>
    </header>

    <main id="appMain" class="app-main">
      <section id="page-today" class="app-page is-active" data-page="today" aria-labelledby="todayTitle">
        <article class="today-hero">
          <p id="todayDate" class="hero-date"></p>
          <h2 id="todayTitle">今日の運勢</h2>
          <p id="todayTheme" class="hero-theme"></p>
          <div class="hero-score-row">
            <div>
              <span class="score-label">総合運</span>
              <strong id="todayScore" class="hero-score"></strong>
            </div>
            <div id="todayStars" class="stars" aria-label="星評価"></div>
          </div>
          <p id="todayMessage" class="hero-message"></p>
        </article>

        <section class="section-card">
          <div class="section-title-row">
            <div>
              <p class="section-kicker">FORTUNE</p>
              <h3>4つの運勢</h3>
            </div>
          </div>
          <div id="todayCategories" class="fortune-grid"></div>
        </section>

        <section class="section-card">
          <div class="section-title-row">
            <div>
              <p class="section-kicker">GUIDANCE</p>
              <h3>今日のヒント</h3>
            </div>
          </div>
          <div id="todayGuidance" class="guidance-list"></div>
        </section>

        <section class="section-card">
          <div class="section-title-row">
            <div>
              <p class="section-kicker">LUCKY</p>
              <h3>開運ポイント</h3>
            </div>
          </div>
          <div id="todayLucky" class="lucky-grid"></div>
          <blockquote id="todayQuote" class="quote-card"></blockquote>
          <button id="favoriteTodayButton" class="primary-button" type="button"></button>
        </section>
      </section>

      <section id="page-history" class="app-page" data-page="history" aria-labelledby="historyTitle">
        <div class="page-heading">
          <div>
            <p class="section-kicker">HISTORY</p>
            <h2 id="historyTitle">運勢の履歴</h2>
          </div>
          <button id="jumpTodayButton" class="text-button" type="button">今月へ</button>
        </div>

        <section class="calendar-card" aria-label="月間カレンダー">
          <div class="calendar-toolbar">
            <button id="prevMonthButton" class="calendar-nav-button" type="button" aria-label="前の月">‹</button>
            <button id="monthTitleButton" class="month-title-button" type="button" aria-label="今月へ移動">
              <span id="calendarYear"></span>
              <strong id="calendarMonth"></strong>
            </button>
            <button id="nextMonthButton" class="calendar-nav-button" type="button" aria-label="次の月">›</button>
          </div>

          <div class="weekday-row" aria-hidden="true">
            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>

          <div class="calendar-legend">
            <span><i class="legend-dot is-today"></i>今日</span>
            <span><i class="legend-dot is-saved"></i>記録あり</span>
            <span><i class="legend-dot is-selected"></i>選択中</span>
          </div>
        </section>

        <section id="historyDetail" class="history-detail" aria-live="polite">
          <div class="detail-placeholder">
            <span aria-hidden="true">☝️</span>
            <p>カレンダーの日付をタップすると、その日の運勢を表示します。</p>
          </div>
        </section>
      </section>

      <section id="page-favorites" class="app-page" data-page="favorites" aria-labelledby="favoritesTitle">
        <div class="page-heading">
          <div>
            <p class="section-kicker">FAVORITES</p>
            <h2 id="favoritesTitle">お気に入り</h2>
          </div>
        </div>
        <div id="favoritesList" class="stack-list"></div>
      </section>

      <section id="page-review" class="app-page" data-page="review" aria-labelledby="reviewTitle">
        <div class="page-heading">
          <div>
            <p class="section-kicker">REVIEW</p>
            <h2 id="reviewTitle">今日の振り返り</h2>
          </div>
        </div>

        <section class="section-card review-form">
          <label for="reviewMood">今日の満足度</label>
          <div id="reviewMood" class="mood-selector" role="radiogroup" aria-label="今日の満足度">
            <button type="button" data-mood="1" aria-label="1点">😣</button>
            <button type="button" data-mood="2" aria-label="2点">😕</button>
            <button type="button" data-mood="3" aria-label="3点">🙂</button>
            <button type="button" data-mood="4" aria-label="4点">😊</button>
            <button type="button" data-mood="5" aria-label="5点">🤩</button>
          </div>

          <label for="reviewText">今日の気づき</label>
          <textarea id="reviewText" rows="5" maxlength="300" placeholder="一言だけでも大丈夫です。"></textarea>
          <div class="input-meta"><span id="reviewCount">0</span>/300</div>

          <button id="saveReviewButton" class="primary-button" type="button">振り返りを保存</button>
        </section>
      </section>

      <section id="page-settings" class="app-page" data-page="settings" aria-labelledby="settingsTitle">
        <div class="page-heading">
          <div>
            <p class="section-kicker">SETTINGS</p>
            <h2 id="settingsTitle">設定</h2>
          </div>
        </div>

        <section class="section-card settings-list">
          <label class="setting-row">
            <span>
              <strong>文字を少し大きくする</strong>
              <small>iPhoneで読みやすい表示に切り替えます。</small>
            </span>
            <input id="largeTextToggle" type="checkbox">
          </label>

          <label class="setting-row">
            <span>
              <strong>動きを減らす</strong>
              <small>画面切り替えのアニメーションを抑えます。</small>
            </span>
            <input id="reduceMotionToggle" type="checkbox">
          </label>

          <div class="setting-row is-static">
            <span>
              <strong>データ保存</strong>
              <small>履歴・お気に入り・振り返りは、この端末のブラウザ内だけに保存されます。</small>
            </span>
          </div>

          <button id="resetDataButton" class="danger-button" type="button">保存データを初期化</button>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button class="nav-item is-active" type="button" data-target="today" aria-current="page">
        <span class="nav-icon">☀</span><span>今日</span>
      </button>
      <button class="nav-item" type="button" data-target="history">
        <span class="nav-icon">▦</span><span>履歴</span>
      </button>
      <button class="nav-item" type="button" data-target="favorites">
        <span class="nav-icon">♡</span><span>お気に入り</span>
      </button>
      <button class="nav-item" type="button" data-target="review">
        <span class="nav-icon">✓</span><span>振り返り</span>
      </button>
      <button class="nav-item" type="button" data-target="settings">
        <span class="nav-icon">⚙</span><span>設定</span>
      </button>
    </nav>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
